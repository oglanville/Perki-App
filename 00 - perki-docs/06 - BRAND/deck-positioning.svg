<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 470" width="680" height="470" role="img" aria-label="Perki market positioning">
<title>Perki positioning</title>
<rect x="0" y="0" width="680" height="470" rx="14" fill="#F4F0E6"/>
<rect x="120" y="44" width="500" height="350" rx="10" fill="#FCFAF4" stroke="#E4DDCB"/>
<line x1="370" y1="44" x2="370" y2="394" stroke="#E4DDCB" stroke-width="1"/>
<line x1="120" y1="219" x2="620" y2="219" stroke="#E4DDCB" stroke-width="1"/>
<text x="370" y="424" text-anchor="middle" fill="#6B6757" font-family="Work Sans, sans-serif" font-size="12.5">Single provider  →  Every provider</text>
<text x="34" y="219" text-anchor="middle" fill="#6B6757" font-family="Work Sans, sans-serif" font-size="12.5" transform="rotate(-90 34 219)">Spend less / cancel  →  Use what you own</text>

<circle cx="225" cy="120" r="7" fill="#6B6757"/>
<text x="240" y="117" fill="#23202A" font-family="Work Sans, sans-serif" font-size="12.5" font-weight="600">Bank &amp; card perks</text>
<text x="240" y="133" fill="#6B6757" font-family="Work Sans, sans-serif" font-size="11">Monzo · Revolut · Amex</text>

<circle cx="470" cy="320" r="7" fill="#6B6757"/>
<text x="485" y="317" fill="#23202A" font-family="Work Sans, sans-serif" font-size="12.5" font-weight="600">Cashback &amp; coupons</text>
<text x="485" y="333" fill="#6B6757" font-family="Work Sans, sans-serif" font-size="11">Honey · TopCashback</text>

<circle cx="300" cy="330" r="7" fill="#6B6757"/>
<text x="196" y="357" fill="#23202A" font-family="Work Sans, sans-serif" font-size="12.5" font-weight="600">Cancellation apps</text>
<text x="196" y="373" fill="#6B6757" font-family="Work Sans, sans-serif" font-size="11">Emma · Rocket Money</text>

<circle cx="505" cy="115" r="16" fill="#2B2A6E"/>
<text x="505" y="121" text-anchor="middle" fill="#E0A93B" font-family="Outfit, sans-serif" font-size="15" font-weight="700">P</text>
<text x="505" y="156" text-anchor="middle" fill="#2B2A6E" font-family="Outfit, sans-serif" font-size="16" font-weight="700">Perki</text>
<text x="505" y="174" text-anchor="middle" fill="#B07C1A" font-family="Work Sans, sans-serif" font-size="11.5" font-weight="600">Every provider, value you already own</text>
<text x="132" y="38" fill="#6B6757" font-family="Work Sans, sans-serif" font-size="11">The white space: nobody else is top-right.</text>
</svg>
